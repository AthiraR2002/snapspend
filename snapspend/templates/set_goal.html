<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Set Savings Goal | SnapSpend</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">
</head>
<body>
    <div class="auth-container" style="max-width: 500px;">
        <div class="auth-card">
            <!-- Branding -->
            <a href="/" class="auth-logo">
                <div class="auth-logo-icon">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="12" y1="1" x2="12" y2="23"></line>
                        <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path>
                    </svg>
                </div>
                <span class="auth-logo-text">SnapSpend</span>
            </a>

            <h1 class="auth-title">Set Savings Goal</h1>
            <p class="auth-subtitle">Establish a target savings goal and track your financial growth</p>

            <!-- Form -->
            <form method="POST" class="auth-form">
                
                <!-- Goal Name -->
                <div class="form-group">
                    <label for="goal_name" class="form-label">Goal Name / Target</label>
                    <div class="input-wrapper">
                        <input type="text" id="goal_name" name="goal_name" class="auth-input" placeholder="e.g. New Macbook, Emergency Fund" required>
                        <div class="input-icon">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon>
                            </svg>
                        </div>
                    </div>
                </div>

                <!-- Target Amount -->
                <div class="form-group">
                    <label for="target_amount" class="form-label">Target Amount (₹)</label>
                    <div class="input-wrapper">
                        <input type="number" step="0.01" min="1" id="target_amount" name="target_amount" class="auth-input" placeholder="e.g. 50000" required>
                        <div class="input-icon">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <line x1="12" y1="1" x2="12" y2="23"></line>
                                <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path>
                            </svg>
                        </div>
                    </div>
                </div>

                <!-- Submit Button -->
                <button type="submit" class="auth-btn">
                    <span>Activate Savings Goal</span>
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="20 6 9 17 4 12"></polyline>
                    </svg>
                </button>
            </form>

            <!-- Footer -->
            <div class="auth-footer" style="margin-top: 25px;">
                <a href="/dashboard" class="auth-link" style="font-size: 14px; color: var(--text-secondary);">← Cancel & Back to Dashboard</a>
            </div>
        </div>
    </div>
</body>
</html>
