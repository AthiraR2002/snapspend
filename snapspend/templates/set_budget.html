<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Set Budget | SnapSpend</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">
</head>
<body>
    <div class="auth-container" style="max-width: 500px;">
        <div class="auth-card">
            <!-- Branding -->
            <a href="/" class="auth-logo">
                <div class="auth-logo-icon">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="12" y1="1" x2="12" y2="23"></line>
                        <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path>
                    </svg>
                </div>
                <span class="auth-logo-text">SnapSpend</span>
            </a>

            <h1 class="auth-title">Set Monthly Budget</h1>
            <p class="auth-subtitle">Establish a monthly spending limit to keep your finances in check</p>

            <!-- Form -->
            <form method="POST" class="auth-form">
                
                <!-- Budget Input -->
                <div class="form-group">
                    <label for="budget" class="form-label">Monthly Spending Limit (₹)</label>
                    <div class="input-wrapper">
                        <input type="number" step="0.01" min="1" id="budget" name="budget" class="auth-input" placeholder="e.g. 20000" required>
                        <div class="input-icon">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <rect x="2" y="4" width="20" height="16" rx="2" ry="2"></rect>
                                <line x1="12" y1="4" x2="12" y2="20"></line>
                            </svg>
                        </div>
                    </div>
                </div>

                <!-- Submit Button -->
                <button type="submit" class="auth-btn">
                    <span>Save Budget Limit</span>
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="20 6 9 17 4 12"></polyline>
                    </svg>
                </button>
            </form>

            <!-- Footer -->
            <div class="auth-footer" style="margin-top: 25px;">
                <a href="/dashboard" class="auth-link" style="font-size: 14px; color: var(--text-secondary);">← Cancel & Back to Dashboard</a>
            </div>
        </div>
    </div>
</body>
</html>
